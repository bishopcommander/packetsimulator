<!DOCTYPE html>
<html>
<head>

    <title>Packet Network Simulator</title>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f2f5f9;
            margin:0;
            padding:40px;
        }

        h1{
            text-align:center;
            margin-bottom:40px;
        }

        .container{
            display:grid;
            grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3{
            margin-top:0;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:8px;
            margin-bottom:12px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            padding:8px 14px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        #output{
            height:200px;
            overflow:auto;
            background:#f7f7f7;
            padding:10px;
            border-radius:5px;
            border:1px solid #ddd;
        }

        #network{
            height:300px;
            border:1px solid #ddd;
            border-radius:5px;
        }
        .hop-success{
        color:#27ae60;
         font-weight:500;
        }

        .hop-fail{
        color:#e74c3c;
        font-weight:600;
        }

    </style>

</head>

<body>

<h1>Network Packet Simulator</h1>

<div class="container">

    <!-- Add Node Card -->
    <div class="card">

        <h3>Add Node</h3>

        <input type="text" id="nodeName" placeholder="Node Name">

        <button onclick="addNode()">Add Node</button>

    </div>


    <!-- Add Edge Card -->
    <div class="card">

        <h3>Add Edge</h3>

        <input type="text" id="fromNode" placeholder="From Node">

        <input type="text" id="toNode" placeholder="To Node">

        <input type="number" id="weight" placeholder="Weight">

        <button onclick="addEdge()">Add Edge</button>

    </div>


    <!-- Send Packet Card -->
    <div class="card">

        <h3>Send Packet</h3>

        <input type="text" id="source" placeholder="Source Node">

        <input type="text" id="destination" placeholder="Destination Node">

        <input type="text" id="data" placeholder="Packet Data">

        <input type="number" step="0.1" id="packetLoss" placeholder="Packet Loss (0-1)">

        <button onclick="sendPacket()">Send Packet</button>

    </div>


    <!-- Network Graph Card -->
    <div class="card">

        <h3>Network Graph</h3>

        <div id="network"></div>

    </div>


    <!-- Output Card -->
    <div class="card">
        <h3>Packet Report</h3>
        <div id="output" class="report-container"></div>
    </div>

</div>

<script src="js/network.js"></script>
<script src="js/script.js"></script>

</body>
</html>
