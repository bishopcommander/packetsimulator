<!DOCTYPE html>
<html>
<head>

    <title>Packet Network Simulator</title>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:0;
            height:100vh;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
        }

        /* MAIN LAYOUT */

        .dashboard{
            display:flex;
            height:100vh;
        }

        /* LEFT CONTROL PANEL */

        .controls{
            width:260px;
            padding:20px;
            background:#111827;
            border-right:1px solid #2d3748;
            overflow-y:auto;
        }

        .card{
            background:#1f2937;
            padding:18px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .card h3{
            margin-top:0;
        }

        input, select{
            width:100%;
            padding:8px;
            margin-top:6px;
            margin-bottom:10px;
            border:none;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        /* MAIN GRAPH AREA */

        .main-area{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        /* NETWORK GRAPH */

        .network-container{
            flex:1;
            padding:20px;
        }

        #network{
            height:100%;
            background:#0f172a;
            border-radius:10px;
        }

        /* PACKET REPORT */

        .report{
            background:#111827;
            padding:20px;
            border-top:2px solid #374151;
        }

        .report h3{
            margin-top:0;
        }

        /* packet status */

        .hop-success{
            color:#4ade80;
            font-weight:500;
        }

        .hop-fail{
            color:#ef4444;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="dashboard">

    <!-- LEFT CONTROL PANEL -->

    <div class="controls">

        <div class="card">

            <h3>Add Node</h3>

            <input type="text" id="nodeName" placeholder="Node Name">

            <button onclick="addNode()">Add Node</button>

        </div>


        <div class="card">

            <h3>Add Edge</h3>

            <input type="text" id="fromNode" placeholder="From Node">

            <input type="text" id="toNode" placeholder="To Node">

            <input type="number" id="weight" placeholder="Weight">

            <button onclick="addEdge()">Add Edge</button>

        </div>


        <div class="card">

            <h3>Send Packet</h3>

            <input type="text" id="source" placeholder="Source Node">

            <input type="text" id="destination" placeholder="Destination Node">

            <input type="text" id="data" placeholder="Packet Data">

            <input type="number" step="0.1" id="packetLoss" placeholder="Packet Loss (0-1)">

            <label for="algoSelect">Algorithm:</label>
            <select id="algoSelect">
                <option value="bfs">BFS (Unweighted)</option>
                <option value="dijkstra">Dijkstra (Weighted)</option>
            </select>

            <button onclick="sendPacket()">Send Packet</button>

        </div>

        <div class="card">
            <h3>Controls</h3>
            <button onclick="clearGraph()">Clear Graph</button>
        </div>

    </div>


    <!-- MAIN GRAPH + REPORT -->

    <div class="main-area">

        <div class="network-container">

            <div id="network"></div>

        </div>

        <div class="report">

            <h3>Packet Report</h3>

            <div id="output"></div>

        </div>

    </div>

</div>

<script src="js/network.js"></script>
<script src="js/script.js"></script>

</body>
</html>
