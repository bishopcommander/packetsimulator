<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packet Simulator | Workspace</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colors from New Landing Page */
            --bg-dark: #020617;
            --bg-surface: #0f172a;
            --accent: #00e5ff; /* Neon Cyan */
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --font-display: 'Syne', sans-serif;
        }

        body.light-theme {
            --bg-dark: #f8fafc;
            --bg-surface: #ffffff;
            --accent: #2563eb;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* SIDEBAR */
        .sidebar {
            width: 340px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .sidebar-logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }
        .sidebar-logo span { color: var(--accent); }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: inline-block;
        }
        .back-link:hover { color: var(--accent); }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            position: relative;
        }
        .card::before {
            content: "[ MODULE ]";
            position: absolute;
            top: 0.6rem; right: 1rem;
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: var(--accent);
            font-weight: 700;
            opacity: 0.6;
        }

        .card h3 {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            display: block;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input, select {
            width: 100%;
            padding: 0.65rem 0.8rem;
            margin-bottom: 1.2rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: var(--font-sans);
            background: rgba(0, 0, 0, 0.2);
            color: #ffffff;
        }
        body.light-theme input, body.light-theme select { background: #f1f5f9; color: #0f172a; }
        
        input:focus, select:focus {
            outline: 2px solid var(--accent);
            outline-offset: -1px;
            border-color: transparent;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        .btn-clear {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        .btn-clear:hover { background: rgba(255, 255, 255, 0.05); }

        /* MAIN AREA */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        #network {
            flex: 1;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            height: 0; 
        }

        .report-area {
            height: 320px;
            border-top: 1px solid var(--border);
            padding: 2rem;
            overflow-y: auto;
            background: var(--bg-dark);
        }

        .report-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .report-header h3 {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        #output {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.7;
            color: var(--text-main);
        }

        .report-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .report-label {
            font-weight: 700;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            letter-spacing: 0.15em;
        }

        .hop-success { color: #00e5ff; font-weight: 700; }
        .hop-fail { color: #ff3d00; font-weight: 800; }
        
        .badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .badge-success { background: rgba(0, 229, 255, 0.1); color: #00e5ff; border: 1px solid #00e5ff; }
        .badge-fail { background: rgba(255, 61, 0, 0.1); color: #ff3d00; border: 1px solid #ff3d00; }

        /* THEME TOGGLE */
        .theme-toggle {
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            background: none;
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">PACKET<span>/SIM</span></div>
        <button class="theme-toggle" id="themeToggle">Light Mode</button>
    </div>
    
    <a href="index.html" class="back-link">← Return to Overview</a>

    <div class="card">
        <h3>Add Node</h3>
        <label>Node Designation</label>
        <input type="text" id="nodeName" placeholder="e.g. ALPHA-01">
        <button onclick="addNode()">Initialize Node</button>
    </div>

    <div class="card">
        <h3>Network Link</h3>
        <label>Origin</label>
        <input type="text" id="fromNode">
        <label>Target</label>
        <input type="text" id="toNode">
        <label>Link Weight (Cost)</label>
        <input type="number" id="weight" value="10">
        <button onclick="addEdge()">Establish Link</button>
    </div>

    <div class="card">
        <h3>Simulation</h3>
        <label>Source Node</label>
        <input type="text" id="source">
        <label>Destination Node</label>
        <input type="text" id="destination">
        <label>Packet Data</label>
        <input type="text" id="data" value="ENCRYPTED_PAYLOAD_V2">
        <label>Drop Probability (0.0 - 1.0)</label>
        <input type="number" step="0.1" id="packetLoss" value="0">
        <label>Routing Logic</label>
        <select id="algoSelect">
            <option value="bfs">Breadth-First Search (Hops)</option>
            <option value="dijkstra">Dijkstra's Algorithm (Cost)</option>
        </select>
        <button onclick="sendPacket()">Execute Trace</button>
    </div>

    <div class="card" style="margin-top: auto; border: none; background: transparent; padding: 0;">
        <button class="btn-clear" onclick="clearGraph()">Purge Network Data</button>
    </div>
</div>

<div class="main">
    <div id="network"></div>
    <div class="report-area">
        <div class="report-header">
            <h3>Simulation Trace Report</h3>
        </div>
        <div id="output">System ready. Waiting for network trace execution...</div>
    </div>
</div>

<script>
    const themeToggle = document.getElementById('themeToggle');
    
    function updateTheme() {
        const isLight = document.body.classList.contains('light-theme');
        themeToggle.textContent = isLight ? 'Dark Mode' : 'Light Mode';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        updateTheme();
    });

    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
    }
    updateTheme();
</script>

<script src="js/network.js"></script>
<script src="js/script.js"></script>

</body>
</html>
